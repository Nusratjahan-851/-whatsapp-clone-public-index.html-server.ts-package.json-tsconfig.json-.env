<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .whatsapp-bg { background-color: #f0f2f5; }
        .chat-bg { background-color: #efeae2; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.4; }
        .sidebar { background-color: #ffffff; }
        .header { background-color: #f0f2f5; }
        .my-msg { background-color: #d9fdd3; align-self: flex-end; }
        .their-msg { background-color: #ffffff; align-self: flex-start; }
    </style>
</head>
<body class="whatsapp-bg h-screen flex overflow-hidden font-sans">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-all">
        <div class="text-center">
            <i class="fab fa-whatsapp text-6xl text-emerald-500 mb-4"></i>
            <h1 class="text-2xl font-light text-gray-600 mb-8">To use WhatsApp on your computer</h1>
            <div id="qr-container" class="bg-white p-4 border rounded-lg shadow-lg">
                <p id="qr-status" class="text-sm text-gray-500 mb-4">Starting server...</p>
                <img id="qr-code" src="" class="hidden w-64 h-64 mx-auto">
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="flex w-full h-full shadow-2xl">
        <!-- Sidebar -->
        <div class="w-1/4 min-w-[350px] border-r border-gray-300 flex flex-col sidebar">
            <div class="header p-4 flex justify-between items-center">
                <div class="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center">
                    <i class="fa fa-user text-gray-500"></i>
                </div>
                <div class="flex gap-6 text-gray-500">
                    <i class="fa fa-circle-notch cursor-pointer"></i>
                    <i class="fa fa-comment-alt cursor-pointer"></i>
                    <i class="fa fa-ellipsis-v cursor-pointer"></i>
                </div>
            </div>
            
            <div class="p-2 bg-white">
                <div class="bg-gray-100 flex items-center px-4 py-2 rounded-lg">
                    <i class="fa fa-search text-gray-400 text-sm mr-4"></i>
                    <input type="text" placeholder="Search or start new chat" class="bg-transparent outline-none text-sm w-full">
                </div>
            </div>

            <div id="chat-list" class="flex-1 overflow-y-auto">
                <!-- Chats go here -->
            </div>
        </div>

        <!-- Chat Window -->
        <div class="flex-1 flex flex-col relative">
            <div class="header p-3 flex justify-between items-center z-10 border-b border-gray-300">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
                    <div>
                        <h2 id="current-chat-name" class="font-semibold text-sm">Select a contact</h2>
                        <p class="text-[11px] text-gray-500">Click to start chatting</p>
                    </div>
                </div>
                <div class="flex gap-6 text-gray-500 px-4">
                    <i class="fa fa-search cursor-pointer"></i>
                    <i class="fa fa-paperclip cursor-pointer"></i>
                    <i class="fa fa-ellipsis-v cursor-pointer"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-10 flex flex-col gap-2 relative">
                <div class="absolute inset-0 chat-bg -z-10"></div>
                <div id="messages" class="flex flex-col gap-2 w-full"></div>
            </div>

            <!-- Input Area -->
            <div class="header p-3 flex items-center gap-4">
                <i class="far fa-smile text-gray-500 text-2xl cursor-pointer"></i>
                <input id="msg-input" type="text" placeholder="Type a message" class="flex-1 py-2 px-4 rounded-lg outline-none text-sm">
                <button id="send-btn" class="text-gray-500 hover:text-emerald-500">
                    <i class="fa fa-paper-plane text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const loginOverlay = document.getElementById('login-overlay');
        const qrImg = document.getElementById('qr-code');
        const qrStatus = document.getElementById('qr-status');
        const chatList = document.getElementById('chat-list');
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');

        let activeJid = null;

        socket.on('whatsapp-status', (status) => {
            if (status === 'connected') {
                loginOverlay.style.display = 'none';
            } else if (status === 'qr-ready') {
                qrStatus.innerText = "Scan the QR code with your WhatsApp";
            }
        });

        socket.on('whatsapp-qr', (data) => {
            qrImg.src = data;
            qrImg.classList.remove('hidden');
        });

        socket.on('new-message', (data) => {
            appendMessage(data.text, 'their-msg', data.timestamp);
            updateChatList(data.jid, data.text, data.sender);
        });

        function appendMessage(text, type, time) {
            const div = document.createElement('div');
            div.className = `${type} p-2 px-4 rounded-lg shadow-sm text-sm max-w-[70%]`;
            div.innerHTML = `
                <p>${text}</p>
                <span class="text-[10px] text-gray-500 block text-right">${time}</span>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.parentElement.scrollTop = messagesDiv.parentElement.scrollHeight;
        }

        function updateChatList(jid, lastMsg, name) {
            let item = document.getElementById(jid);
            if (!item) {
                item = document.createElement('div');
                item.id = jid;
                item.className = "p-4 flex items-center gap-3 cursor-pointer hover:bg-gray-100 border-b";
                item.onclick = () => {
                    activeJid = jid;
                    document.getElementById('current-chat-name').innerText = name;
                    messagesDiv.innerHTML = "";
                };
                chatList.prepend(item);
            }
            item.innerHTML = `
                <div class="w-12 h-12 bg-gray-300 rounded-full flex-shrink-0"></div>
                <div class="flex-1 truncate">
                    <h4 class="font-semibold text-sm">${name || jid.split('@')[0]}</h4>
                    <p class="text-xs text-gray-500 truncate">${lastMsg}</p>
                </div>
            `;
        }

        sendBtn.onclick = () => {
            const text = msgInput.value.trim();
            if (text && activeJid) {
                socket.emit('send-message', { to: activeJid, text });
                appendMessage(text, 'my-msg', new Date().toLocaleTimeString());
                msgInput.value = "";
            }
        };

        msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendBtn.click(); };
    </script>
</body>
</html>
